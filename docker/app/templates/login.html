<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="robots" content="noindex, nofollow">
    <title>SmykkerPay — Secure Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">

    <div class="auth-container">

        <div class="auth-brand">
            <div class="brand-mark">S</div>
            <span class="brand-name">SmykkerPay</span>
        </div>

        <div class="auth-card">
            <h1 class="auth-title">Sign in</h1>
            <p class="auth-subtitle">Access your secure dashboard</p>

            {% if error %}
            <div class="alert alert-error" role="alert">
                <span class="alert-icon">⚠</span>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="auth-form" autocomplete="off" novalidate>

                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-input"
                        placeholder="Enter your username"
                        required
                        autocomplete="username"
                        spellcheck="false"
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Sign in securely
                </button>

            </form>
        </div>

        <div class="auth-footer">
            <div class="security-badge">
                <span class="security-icon">🔒</span>
                <span>256-bit TLS encryption</span>
                <span class="sep">·</span>
                <span>WAF protected</span>
                <span class="sep">·</span>
                <span>GCP hosted</span>
            </div>
        </div>

    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>

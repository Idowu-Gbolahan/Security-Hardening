# -------------------------------------------------------------
# SECTION 1 — SERVER IDENTITY
# -------------------------------------------------------------

# Server name matches our internal domain
ServerName smykker.internal

# Hide version information
# (security.conf handles ServerTokens/ServerSignature
#  but this ensures it at main config level too)
ServerAdmin admin@smykker.internal

# -------------------------------------------------------------
# SECTION 2 — PROCESS & PERFORMANCE
# -------------------------------------------------------------

# Run in foreground (required for Docker)
# Keeps Apache2 as PID 1 in container
# Without this Docker stops the container immediately

# Timeout for all operations
Timeout 60

# Enable persistent connections
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5

# -------------------------------------------------------------
# SECTION 3 — MODULE LOADING
# -------------------------------------------------------------
# Only load modules we explicitly need
# Every loaded module = additional attack surface

# Core modules (required)
LoadModule mpm_event_module     /usr/lib/apache2/modules/mod_mpm_event.so
LoadModule authz_core_module    /usr/lib/apache2/modules/mod_authz_core.so
LoadModule authz_host_module    /usr/lib/apache2/modules/mod_authz_host.so
LoadModule auth_basic_module    /usr/lib/apache2/modules/mod_auth_basic.so

# Request handling
LoadModule dir_module           /usr/lib/apache2/modules/mod_dir.so
LoadModule mime_module          /usr/lib/apache2/modules/mod_mime.so
LoadModule alias_module         /usr/lib/apache2/modules/mod_alias.so
LoadModule rewrite_module       /usr/lib/apache2/modules/mod_rewrite.so

# Security modules
LoadModule headers_module       /usr/lib/apache2/modules/mod_headers.so
LoadModule ssl_module           /usr/lib/apache2/modules/mod_ssl.so
LoadModule reqtimeout_module    /usr/lib/apache2/modules/mod_reqtimeout.so

# Logging
LoadModule log_config_module    /usr/lib/apache2/modules/mod_log_config.so
LoadModule logio_module         /usr/lib/apache2/modules/mod_logio.so

# Status (internal health check only)
LoadModule status_module        /usr/lib/apache2/modules/mod_status.so

# -------------------------------------------------------------
# SECTION 4 — USER & GROUP
# -------------------------------------------------------------
# Run as non-root apache-usr
# Matches UID/GID 1001 set in Dockerfile

User  apache-usr
Group apache-grp

# -------------------------------------------------------------
# SECTION 5 — NETWORK & LISTENING
# -------------------------------------------------------------

# Listen on non-privileged port 8080
# Port 80 requires root or NET_BIND_SERVICE capability
# We dropped ALL capabilities so use 8080
Listen 8080

# Bind to all interfaces inside container
# Nginx is the only service that can reach us
# via the backend Docker network

# -------------------------------------------------------------
# SECTION 6 — FILESYSTEM ACCESS CONTROL
# -------------------------------------------------------------

# Deny EVERYTHING by default
# Then explicitly allow only what is needed
# Zero trust applied to filesystem

<Directory />
    Options None
    AllowOverride None
    Require all denied
</Directory>

# Allow access to document root only
<Directory /var/www/html>
    Options None
    AllowOverride None
    Require all granted

    # Disable directory browsing
    # Without this Apache shows file listing
    # when no index.html exists
    DirectoryIndex index.html
    Options -Indexes
</Directory>

# Deny access to hidden files (.htaccess, .git etc)
<FilesMatch "^\.">
    Require all denied
</FilesMatch>

# Deny access to sensitive file types
<FilesMatch "\.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$">
    Require all denied
</FilesMatch>

# Deny access to version control directories
<DirectoryMatch "/\.(git|svn|hg)/">
    Require all denied
</DirectoryMatch>

# -------------------------------------------------------------
# SECTION 7 — DOCUMENT ROOT
# -------------------------------------------------------------

DocumentRoot /var/www/html

# Default character set
AddDefaultCharset UTF-8

# MIME types
TypesConfig /etc/mime.types
DefaultType application/octet-stream

# Prevent MIME type sniffing
# (also set in security.conf headers)
AddType application/x-content-type-options nosniff

# -------------------------------------------------------------
# SECTION 8 — HEALTH CHECK ENDPOINT
# -------------------------------------------------------------
# Used by Docker HEALTHCHECK instruction:
# CMD curl -f http://127.0.0.1:8080/ || exit 1
# Also used by Nginx upstream health checks

<Location /health>
    SetHandler server-status
    Require local
    # Only accessible from localhost
    # Not reachable from outside container ✅
</Location>

# Deny server-status from everywhere else
<Location /server-status>
    Require all denied
</Location>

# -------------------------------------------------------------
# SECTION 9 — REQUEST TIMEOUT HARDENING
# -------------------------------------------------------------
# Protects against Slowloris and R-U-Dead-Yet attacks
# (also defined in security.conf but set here at
#  server level for belt-and-suspenders)

# mod_reqtimeout settings:
# Header must be received within 20 seconds
# Body must be received at minimum 500 bytes/second
# with 20 second initial timeout
<IfModule mod_reqtimeout.c>
    RequestReadTimeout header=20-40,minrate=500
    RequestReadTimeout body=20,minrate=500
</IfModule>

# -------------------------------------------------------------
# SECTION 10 — LOGGING
# -------------------------------------------------------------

# Error log
ErrorLog /var/log/apache2/error.log
LogLevel warn

# Access log format
# Combined format includes:
# IP, timestamp, request, status, bytes, referrer, user-agent
LogFormat "%h %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" combined
LogFormat "%h %l %u %t \"%r\" %>s %O" common

# Use combined format for access log
CustomLog /var/log/apache2/access.log combined

# Log incoming and outgoing bytes
# Useful for detecting data exfiltration
LogFormat "%h %l %u %t \"%r\" %>s %O %I \"%{Referer}i\"" combinedio
CustomLog /var/log/apache2/io.log combinedio

# -------------------------------------------------------------
# SECTION 11 — INCLUDE SECURITY CONFIGURATION
# -------------------------------------------------------------
# Load our security hardening settings
# from security.conf
# This includes all security headers,
# rate limiting, and HTTP method restrictions

Include /etc/apache2/conf-enabled/*.conf

# =============================================================
# END OF CONFIGURATION
# =============================================================